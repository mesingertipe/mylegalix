name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./src
        file: ./src/Legalix.API/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/mylegalix-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Web image
      uses: docker/build-push-action@v5
      with:
        context: ./src/Legalix.Web
        file: ./src/Legalix.Web/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/mylegalix-web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to DigitalOcean via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USER }}
        key: ${{ secrets.DO_SSH_KEY }}
        script: |
          mkdir -p /app/mylegalix
          cd /app/mylegalix
          
          # Simplified docker-compose using the .env file already on the server
          cat <<EOF > docker-compose.yml
          version: '3.8'
          services:
            api:
              image: ghcr.io/${{ github.repository_owner }}/mylegalix-api:latest
              container_name: mylegalix-api
              restart: always
              env_file: .env
              environment:
                ASPNETCORE_ENVIRONMENT: Production
                ConnectionStrings__DefaultConnection: "Host=host.docker.internal;Database=\${DB_NAME};Username=\${DB_USER};Password=\${DB_PASSWORD}"
              extra_hosts:
                - "host.docker.internal:host-gateway"
              networks:
                - mylegalix-network
              expose:
                - "8080"

            web:
              image: ghcr.io/${{ github.repository_owner }}/mylegalix-web:latest
              container_name: mylegalix-web
              restart: always
              depends_on:
                - api
              networks:
                - mylegalix-network
              ports:
                - "80:80"

          networks:
            mylegalix-network:
              driver: bridge
          EOF

          # Log in to registry on droplet
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull and Restart
          docker compose pull
          docker compose up -d
          docker system prune -f
