services:
  restohr-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=RestoHR
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432" # Use 5433 to avoid conflict with Legalix if running
    volumes:
      - restohr_postgres_data:/var/lib/postgresql/data

volumes:
  restohr_postgres_data:
